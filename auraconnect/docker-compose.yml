services:
  auraconnect:
    build:
      context: .
      dockerfile: Dockerfile
    image: auraconnect:latest
    container_name: auraconnect
    restart: unless-stopped
    ports:
      - "0.0.0.0:3005:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Required for some Docker versions

