# --- Dokploy variant — dev ---
# Shared env vars (API_URL, PayFast keys, etc.) come from the .env file
# written by Dokploy (UI → Environment tab).
# Dev-specific vars including TENANT_ID come from ./env/dev.env (tracked in repo).

x-portal-base: &portal-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  environment:
    NODE_ENV: production
    NEXT_TELEMETRY_DISABLED: "1"
  restart: unless-stopped

services:
  dev:
    <<: *portal-base
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SHARED_BUILD_ENV_FILE: docker/.env
        BUILD_ENV_FILE: docker/env/dev.env
    image: auraconnect-portal-dev:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
      - ./env/dev.env
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
