# --- Shared portal defaults (merged via YAML anchor) ---
x-portal-base: &portal-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  environment:
    NODE_ENV: production
    NEXT_TELEMETRY_DISABLED: "1"
  restart: unless-stopped

# --- Portal services ---
# To add a new portal:
#   1. Create docker/env/<portal>.env with site-specific vars (branding + NEXT_PUBLIC_* + BASE_URL)
#   2. Keep shared vars in docker/env/.env.shared (git-ignored) and commit docker/env/.env.shared.example
#   3. Copy one of the service blocks below and update service name/image/port/file names
services:
  ### PluxNet Branded Portals
  randburg-taxi:
    <<: *portal-base
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        SHARED_BUILD_ENV_FILE: .env
        BUILD_ENV_FILE: docker/env/randburg-taxi.env
    image: auraconnect-randburg-taxi:latest
    ports:
      - "4001:3000"
    env_file:
      - .env
      - ./env/randburg-taxi.env

  cosmo-taxi:
    <<: *portal-base
    build:
      context: ..
