# --- Shared portal defaults (merged via YAML anchor) ---
x-portal-base: &portal-base
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    NODE_ENV: production
    NEXT_TELEMETRY_DISABLED: "1"
  restart: unless-stopped

# --- Portal services ---
# To add a new portal:
#   1. Create .env.<portal> with both build-time (NEXT_PUBLIC_*) and runtime vars
#   2. Copy one of the service blocks below, update the name, BUILD_ENV_FILE, image, and port
services:
  zandspruit:
    <<: *portal-base
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV_FILE: .env.zandspruit
    image: auraconnect-zandspruit:latest
    ports:
      - "3001:3000"
    env_file:
      - .env.zandspruit

  joburg-theatre:
    <<: *portal-base
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV_FILE: .env.joburg-theatre
    image: auraconnect-joburg-theatre:latest
    ports:
      - "3008:3000"
    env_file:
      - .env.joburg-theatre
