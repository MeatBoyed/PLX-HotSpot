name: ${COMPOSE_PROJECT_NAME:-vv-hotspot}

services:
  web:
    build:
      context: .
      dockerfile: ${DOCKERFILE_PATH:-Dockerfile}
      args:
        BUILD_ENV_FILE: ${BUILD_ENV_FILE:-.env}
    image: ${IMAGE_REF:-vv-hotspot:latest}
    ports:
      - "${HOST_PORT:-3000}:3000"
    env_file:
      - ${RUNTIME_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped
